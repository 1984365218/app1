<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一起看 · 多人观影社交平台</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
</head>
<body>

  <!-- ========== 大厅 ========== -->
  <div id="lobby" class="view">
    <div class="lobby-bg"></div>
    <div class="lobby-card">
      <div class="lobby-logo">
        <div class="logo-icon">🎬</div>
        <h1>一起看</h1>
      </div>
      <p class="subtitle">多人观影 · 连麦畅聊 · 实时同步</p>
      <div class="form-group">
        <div class="input-icon">👤</div>
        <input id="userName" placeholder="取个昵称吧" maxlength="20" autocomplete="off" />
      </div>
      <button id="btnCreate" class="btn-primary">
        <span>✨</span> 创建房间
      </button>
      <div class="divider"><span>或加入已有房间</span></div>
      <div class="join-row">
        <input id="joinRoomId" placeholder="输入房间号" maxlength="10" />
        <button id="btnJoin" class="btn-join">加入</button>
      </div>
      <p class="hint">视频由每个人在本地用自己的网络播放，服务器仅同步进度</p>
    </div>
  </div>

  <!-- ========== 房间（聊天主页）========== -->
  <div id="room" class="view hidden">

    <!-- 顶栏 -->
    <header class="topbar">
      <div class="topbar-left">
        <span class="room-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          房间 <strong id="roomName"></strong>
          <code id="roomIdLabel"></code>
        </span>
        <span id="controllerTag" class="ctrl-tag hidden"></span>
      </div>
      <div class="topbar-right">
        <button id="btnMembers" class="btn-icon" title="在线成员">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>成员</span>
        </button>
        <button id="btnWatch" class="btn-watch" title="进入观影模式">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          <span>一起看</span>
        </button>
        <button id="btnMic" class="btn-icon mic-btn" title="连麦">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
          <span>开麦</span>
        </button>
        <button id="btnCopy" class="btn-icon" title="复制房间号">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
        <button id="btnLeave" class="btn-danger">离开</button>
      </div>
    </header>

    <!-- 聊天主页 -->
    <main class="main-layout">
      <section class="chat-section">
        <div class="chat-container">

          <!-- 观影 CTA 横幅 -->
          <div id="watchCta" class="watch-cta hidden">
            <div class="cta-art">🎬</div>
            <div class="cta-text">
              <strong id="watchCtaTitle">还没有共享视频</strong>
              <span id="watchCtaSub">点这里进入观影模式，和大家一起看</span>
            </div>
            <button id="watchCtaBtn" class="btn-watch">一起看</button>
          </div>

          <!-- 聊天头部 -->
          <div class="chat-header">
            <div class="chat-header-left">
              <span class="chat-title">💬 聊天</span>
              <span class="online-dot"></span>
            </div>
            <span class="member-count"><span id="userCount">0</span> 人在线</span>
          </div>

          <!-- 消息列表 -->
          <div id="chatMessages" class="chat-messages"></div>

          <!-- 待发送附件预览 -->
          <div id="pendingAttach" class="pending-attach hidden"></div>

          <!-- 输入栏 -->
          <div class="chat-input-bar">
            <label class="attach-btn" title="附加图片">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <input id="chatImage" type="file" accept="image/*" multiple hidden />
            </label>
            <div class="input-wrap">
              <input id="chatInput" placeholder="输入消息…（Enter 发送，可先拖入/粘贴图片再发送）" maxlength="2000" />
            </div>
            <button id="btnSend" class="btn-send">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <div id="dropOverlay" class="drop-overlay hidden">📷 松开即可加入发送（可在下方配文字）</div>
        </div>
      </section>
    </main>

    <!-- ========== 观影模式（弹幕） ========== -->
    <div id="watchMode" class="watch-mode hidden">
      <!-- 观影顶栏 -->
      <div class="watch-top">
        <button id="watchExit" class="watch-exit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          退出观影
        </button>
        <div class="watch-titlebar">
          <span class="watch-title-label">正在观看</span>
          <span id="watchTitle" class="watch-title"></span>
        </div>
        <div class="watch-top-right">
          <button id="watchLoad" class="wt-btn" title="加载 / 切换视频">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button id="watchMembers" class="wt-btn" title="在线成员">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
          </button>
          <button id="watchMic" class="wt-btn mic-btn" title="连麦">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
          </button>
        </div>
      </div>

      <!-- 视频舞台 -->
      <div id="watchStage" class="watch-stage">
        <video id="video" playsinline></video>
        <audio id="videoAudio" playsinline></audio>

        <!-- 弹幕层 -->
        <div id="danmakuLayer" class="danmaku-layer"></div>

        <!-- 大播放按钮 -->
        <button id="watchBigPlay" class="watch-bigplay hidden">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
        </button>

        <!-- 空状态 -->
        <div id="watchEmpty" class="watch-empty">
          <div class="empty-art">
            <div class="empty-tv">
              <div class="tv-screen"><div class="tv-reflection"></div></div>
            </div>
          </div>
          <p class="empty-title">还没有共享视频</p>
          <p class="empty-desc">点右上角「加载」粘贴 B 站链接或选择本地文件，即可和房间里的其他人一起观看，聊天会以弹幕飘过屏幕。</p>
        </div>

        <!-- 加载面板 -->
        <div id="watchLoadPanel" class="watch-load-panel hidden">
          <div class="wlp-head">
            <span>加载视频</span>
            <button id="watchLoadClose" class="wlp-close">×</button>
          </div>
          <div class="load-row">
            <div class="load-input-wrap">
              <svg class="load-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
              <input id="biliUrl" placeholder="B 站链接（含 BV 号）…" />
            </div>
            <button id="btnLoadBili" class="btn-load">加载</button>
          </div>
          <div class="load-row alt">
            <div class="load-input-wrap">
              <svg class="load-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
              <input id="videoUrl" placeholder="视频直链 URL…" />
            </div>
            <button id="btnLoadUrl" class="btn-load">加载</button>
            <span class="sep-text">或</span>
            <label class="file-btn">本地文件<input id="videoFile" type="file" accept="video/*" hidden /></label>
          </div>
          <select id="biliQuality" class="quality-select" hidden></select>
          <p id="videoHint" class="video-hint"></p>
        </div>

        <!-- 自定义控制条 -->
        <div class="watch-controls">
          <div class="wc-progress">
            <input id="wcSeek" type="range" min="0" max="100" value="0" step="0.1" />
          </div>
          <div class="wc-bar">
            <button id="wcPlay" class="wc-btn" title="播放/暂停">
              <svg class="ic-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 4 20 12 6 20 6 4"/></svg>
              <svg class="ic-pause hidden" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <span id="wcTime" class="wc-time">00:00 / 00:00</span>
            <div class="wc-volume">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              <input id="wcVolume" type="range" min="0" max="1" step="0.05" value="1" />
            </div>
            <span class="wc-spacer"></span>
            <button id="wcDanmaku" class="wc-btn wc-toggle active" title="弹幕开关">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="13" rx="2"/><line x1="6" y1="10" x2="6" y2="10"/><line x1="10" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="14" y2="10"/><line x1="18" y1="10" x2="18" y2="10"/></svg>
              <span>弹幕</span>
            </button>
            <button id="wcFull" class="wc-btn" title="全屏">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m13-5v3a2 2 0 0 1-2 2h-3"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 弹幕输入栏 -->
      <div class="watch-inputbar">
        <input id="watchInput" placeholder="发条弹幕…（Enter 发送）" maxlength="60" />
        <button id="watchSend" class="btn-watch">发送</button>
      </div>
    </div>

    <!-- ========== 成员抽屉 ========== -->
    <div id="membersDrawer" class="members-drawer hidden">
      <div class="drawer-head">
        <span>👥 在线成员</span>
        <button id="membersClose" class="drawer-close">×</button>
      </div>
      <ul id="userListWatch" class="member-list"></ul>
    </div>

    <!-- 图片放大遮罩 -->
    <div id="lightboxOverlay" class="lightbox-overlay hidden">
      <img id="lightboxImg" src="" alt="" />
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="vendor/dash.all.min.js"></script>
  <script src="client.js"></script>
</body>
</html>
